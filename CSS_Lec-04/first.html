<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styler.css" >

</head>
<body>

    <!-- div ka parent yahan body hoga na. -->
    <div class="box">
        <form>
            <h1>Login Form</h1>

            <!-- div ek block level element hai. -->

            <div>
            <label for="first" style="display: block;">Username</label>
            <input type="text" id="first" placeholder="Enter your username">
            </div>

            <div>
            <label for="second" style="display: block;">Password</label>
            <input type="password" id="second" placeholder="Enter your password">
            </div>

            <br>
            <br>

            <button style="width: 100%; height: 50px; font-size: 30px; padding: 5px; background-color: blueviolet; color:white;">Login</button>

        </form>
    </div>
    
</body>
</html>
