<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp Form</title>
    
    <!-- Font Awesome Link (सिम्बल्स लोड करने के लिए) -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <!-- आपकी External CSS फ़ाइल का लिंक -->
    <link rel="stylesheet" href="styling.css">
</head>
<body>

        <div class="box">
            <form>
                <h1>SignUp Form</h1>

                <!-- यूजरनेम बॉक्स -->
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Enter Username" required>
                </div>

                <!-- ईमेल बॉक्स -->
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email:yourname123@gmail.com" required>
                </div>

                <!-- पासवर्ड बॉक्स -->
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Create Password" required>
                </div>

                <!-- दोबारा पासवर्ड बॉक्स -->
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Confirm Password" required>
                </div>

                <!-- आपका कस्टम ब्राउन और गोल्ड बटन यहाँ जोड़ दिया गया है -->
                <div>
                    <button type="submit" class="signup-btn" style="width: 100%; height: 35px; font-size: 20px; padding: 4px; background-color:brown; color:gold; cursor:pointer;">SignUP</button>
                </div>
              
            </form>
        </div>

</body>
</html>
